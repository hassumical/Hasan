<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Battle Royale Online</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display:block; background:#1a2332; touch-action:none; }
  #hud {
    position:absolute; top:0; left:0; width:100%; padding:12px 16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; color:#fff; z-index:5;
  }
  .panel { background:rgba(10,14,20,0.7); border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:8px 12px; }
  #healthBarOuter { width:160px; height:16px; background:#2a2a2a; border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.2); }
  #healthBarInner { height:100%; width:100%; background:linear-gradient(90deg,#4ade80,#22c55e); transition:width 0.2s; }
  #weaponInfo { font-size:14px; margin-top:6px; color:#fbbf24; font-weight:600; }
  #stats { font-size:13px; text-align:right; }
  #zoneWarn { color:#f87171; font-weight:700; font-size:13px; margin-top:4px; }
  #centerMsg {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#fff; text-align:center; z-index:10; pointer-events:none;
  }
  #centerMsg h1 { font-size:32px; margin-bottom:10px; text-shadow:0 2px 10px rgba(0,0,0,0.8); }
  #centerMsg p { font-size:15px; opacity:0.85; }
  #joystick {
    position:absolute; width:110px; height:110px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.25);
    display:none; z-index:8;
  }
  #joystickKnob {
    position:absolute; width:46px; height:46px; border-radius:50%;
    background:rgba(255,255,255,0.35); top:32px; left:32px;
  }
  #shootBtn {
    position:absolute; bottom:36px; right:36px; width:80px; height:80px; border-radius:50%;
    background:rgba(239,68,68,0.5); border:3px solid rgba(255,255,255,0.4);
    display:none; align-items:center; justify-content:center; font-size:26px; z-index:8;
  }
  #nameOverlay {
    position:absolute; inset:0; background:rgba(10,14,20,0.95); z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:20px;
  }
  #nameOverlay h1 { font-size:26px; margin-bottom:14px; color:#fbbf24; }
  #nameOverlay p { max-width:420px; font-size:14px; line-height:1.6; opacity:0.85; margin-bottom:14px; }
  #nameInput { padding:10px 14px; font-size:16px; border-radius:8px; border:none; margin-bottom:14px; width:220px; text-align:center; }
  #joinBtn { padding:10px 24px; font-size:16px; border:none; border-radius:8px; background:#22c55e; color:#fff; font-weight:700; cursor:pointer; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="panel">
    <div id="healthBarOuter"><div id="healthBarInner"></div></div>
    <div id="weaponInfo">Pistol</div>
  </div>
  <div class="panel" id="stats">
    <div>Kills: <span id="killCount">0</span></div>
    <div>Alive: <span id="aliveCount">0</span>/<span id="totalCount">0</span></div>
    <div id="zoneWarn"></div>
  </div>
</div>

<div id="joystick"><div id="joystickKnob"></div></div>
<div id="shootBtn">🔫</div>

<div id="centerMsg" class="hidden">
  <h1 id="msgTitle"></h1>
  <p id="msgSub"></p>
</div>

<div id="nameOverlay">
  <h1>⚔️ Battle Royale — Online</h1>
  <p>Ye REAL online multiplayer hai. Server pe jitne bhi players connect honge, sab ek hi map mein saath khelenge. Kam se kam 1 aur player connect hote hi round shuru hoga.</p>
  <input id="nameInput" placeholder="Apna naam likho" maxlength="16">
  <button id="joinBtn" onclick="joinGame()">Join Game</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let socket = null;
let myId = null;
let MAP_SIZE = 2400;
let WEAPON_NAMES = ['Pistol','SMG','Shotgun','Rifle'];
const WEAPON_COLORS = { Pistol:'#94a3b8', SMG:'#60a5fa', Shotgun:'#f97316', Rifle:'#a855f7' };

let latestState = null;
let camera = {x:0, y:0};
let keys = {};
let mouse = {x:0, y:0, down:false};

function joinGame(){
  const name = document.getElementById('nameInput').value.trim() || 'Player';
  document.getElementById('nameOverlay').classList.add('hidden');
  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if(isTouch){
    document.getElementById('joystick').style.display = 'block';
    document.getElementById('shootBtn').style.display = 'flex';
  }
  connect(name);
}

function connect(name){
  socket = io();
  socket.on('init', (data) => {
    myId = data.id;
    MAP_SIZE = data.mapSize;
    WEAPON_NAMES = data.weapons.map(w => w.name);
    socket.emit('setName', name);
  });
  socket.on('state', (state) => {
    latestState = state;
    updateHUD();
  });
  socket.on('roundStart', () => {
    document.getElementById('centerMsg').classList.add('hidden');
  });
  socket.on('roundEnd', (data) => {
    const msg = document.getElementById('centerMsg');
    msg.classList.remove('hidden');
    document.getElementById('msgTitle').textContent = data.winnerId === myId ? '🏆 You Won!' : (data.winnerName ? data.winnerName + ' Wins' : 'Round Over');
    document.getElementById('msgSub').textContent = 'Next round shuru hoga jaldi hi...';
  });

  requestAnimationFrame(loop);
  setInterval(sendInput, 50); // 20Hz input send
}

function updateHUD(){
  if(!latestState) return;
  const me = latestState.players.find(p => p.id === myId);
  if(me){
    document.getElementById('healthBarInner').style.width = Math.max(0,me.hp) + '%';
    document.getElementById('weaponInfo').textContent = WEAPON_NAMES[me.weaponIdx];
    document.getElementById('killCount').textContent = me.kills;
  }
  const alive = latestState.players.filter(p => p.alive).length;
  document.getElementById('aliveCount').textContent = alive;
  document.getElementById('totalCount').textContent = latestState.players.length;

  if(latestState.gameState === 'waiting'){
    document.getElementById('centerMsg').classList.remove('hidden');
    document.getElementById('msgTitle').textContent = 'Waiting for players...';
    document.getElementById('msgSub').textContent = 'Doosre browser tab/device se bhi is address pe join karo.';
  } else if(latestState.gameState === 'running'){
    document.getElementById('centerMsg').classList.add('hidden');
  }
}

// --- Input handling ---
window.addEventListener('keydown', e=> keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e=>{ mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', ()=> mouse.down = true);
canvas.addEventListener('mouseup', ()=> mouse.down = false);

let joyActive = false, joyStart = {x:0,y:0}, joyVec = {x:0,y:0};
const joystick = document.getElementById('joystick');
const joyKnob = document.getElementById('joystickKnob');
canvas.addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    if(t.clientX < W*0.5){
      joyActive = true;
      joyStart = {x:t.clientX, y:t.clientY};
      joystick.style.left = (t.clientX-55)+'px';
      joystick.style.top = (t.clientY-55)+'px';
      joystick.style.display = 'block';
    }
  }
}, {passive:true});
canvas.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches){
    if(joyActive){
      let dx = t.clientX - joyStart.x, dy = t.clientY - joyStart.y;
      let d = Math.hypot(dx,dy);
      let max = 50;
      if(d > max){ dx = dx/d*max; dy = dy/d*max; }
      joyKnob.style.left = (32+dx)+'px';
      joyKnob.style.top = (32+dy)+'px';
      joyVec = {x: dx/max, y: dy/max};
    }
  }
}, {passive:true});
canvas.addEventListener('touchend', ()=>{
  joyActive = false;
  joyVec = {x:0,y:0};
  joyKnob.style.left = '32px';
  joyKnob.style.top = '32px';
}, {passive:true});

const shootBtn = document.getElementById('shootBtn');
let touchShooting = false;
shootBtn.addEventListener('touchstart', e=>{ touchShooting = true; e.stopPropagation(); }, {passive:true});
shootBtn.addEventListener('touchend', e=>{ touchShooting = false; e.stopPropagation(); }, {passive:true});

let lastAngle = 0;
function sendInput(){
  if(!socket || !latestState) return;
  let mvx=0, mvy=0;
  if(keys['w']||keys['arrowup']) mvy -= 1;
  if(keys['s']||keys['arrowdown']) mvy += 1;
  if(keys['a']||keys['arrowleft']) mvx -= 1;
  if(keys['d']||keys['arrowright']) mvx += 1;
  if(joyVec.x || joyVec.y){ mvx += joyVec.x; mvy += joyVec.y; }

  const me = latestState.players.find(p => p.id === myId);
  let angle = lastAngle;
  if(me){
    const worldMouseX = mouse.x + camera.x;
    const worldMouseY = mouse.y + camera.y;
    if(!('ontouchstart' in window)){
      angle = Math.atan2(worldMouseY - me.y, worldMouseX - me.x);
    } else if(joyVec.x || joyVec.y){
      angle = Math.atan2(joyVec.y, joyVec.x);
    }
  }
  lastAngle = angle;

  socket.emit('input', {
    mvx, mvy, angle,
    shooting: mouse.down || touchShooting
  });
}

function loop(){
  render();
  requestAnimationFrame(loop);
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(!latestState){
    ctx.fillStyle = '#fff';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Connecting...', W/2, H/2);
    return;
  }

  const me = latestState.players.find(p => p.id === myId);
  if(me){
    camera.x = me.x - W/2;
    camera.y = me.y - H/2;
  }

  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  ctx.fillStyle = '#1a2332';
  ctx.fillRect(0,0,MAP_SIZE,MAP_SIZE);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  for(let gx=0; gx<MAP_SIZE; gx+=100){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,MAP_SIZE); ctx.stroke(); }
  for(let gy=0; gy<MAP_SIZE; gy+=100){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(MAP_SIZE,gy); ctx.stroke(); }

  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 6;
  ctx.strokeRect(0,0,MAP_SIZE,MAP_SIZE);

  const zone = latestState.zone;
  if(zone){
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.rect(0,0,MAP_SIZE,MAP_SIZE);
    ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI*2, true);
    ctx.fill('evenodd');
    ctx.strokeStyle = '#38bdf8';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI*2);
    ctx.stroke();
  }

  for(const p of latestState.pickups){
    const wname = WEAPON_NAMES[p.weaponIdx];
    ctx.fillStyle = WEAPON_COLORS[wname] || '#fff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(wname, p.x, p.y-16);
  }

  for(const b of latestState.bullets){
    const wname = WEAPON_NAMES[b.weaponIdx];
    ctx.fillStyle = WEAPON_COLORS[wname] || '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
    ctx.fill();
  }

  for(const p of latestState.players){
    if(!p.alive) continue;
    drawEntity(p);
  }

  ctx.restore();
  drawMinimap();
}

function drawEntity(e){
  const isMe = e.id === myId;
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.rotate(e.angle);
  ctx.fillStyle = isMe ? '#22c55e' : '#ef4444';
  ctx.beginPath();
  ctx.arc(0,0,14,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, -3, 20, 6);
  ctx.restore();

  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(e.name || '', e.x, e.y-28);

  const barW = 30;
  ctx.fillStyle = '#333';
  ctx.fillRect(e.x-barW/2, e.y-e_radius_offset(), barW, 5);
  ctx.fillStyle = isMe ? '#22c55e' : '#f87171';
  ctx.fillRect(e.x-barW/2, e.y-e_radius_offset(), barW*Math.max(0,e.hp)/100, 5);
}
function e_radius_offset(){ return 14+14; }

function drawMinimap(){
  if(!latestState) return;
  const size = 130, pad = 14;
  const mx = W - size - pad, my = H - size - pad;
  ctx.fillStyle = 'rgba(10,14,20,0.7)';
  ctx.fillRect(mx,my,size,size);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.strokeRect(mx,my,size,size);
  const scale = size/MAP_SIZE;
  const zone = latestState.zone;
  if(zone){
    ctx.strokeStyle = '#38bdf8';
    ctx.beginPath();
    ctx.arc(mx+zone.x*scale, my+zone.y*scale, zone.radius*scale, 0, Math.PI*2);
    ctx.stroke();
  }
  for(const p of latestState.players){
    if(!p.alive) continue;
    ctx.fillStyle = p.id === myId ? '#22c55e' : '#f87171';
    ctx.beginPath();
    ctx.arc(mx+p.x*scale, my+p.y*scale, p.id===myId?3:2.5, 0, Math.PI*2);
    ctx.fill();
  }
}
</script>
</body>
</html>
